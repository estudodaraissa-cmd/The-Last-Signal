<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* MANTENDO TODA A SUA ESTILIZAÇÃO ORIGINAL */
:root {
  --bg: #090c12; --surface: #0f1420; --card: #131825; --border: rgba(255,255,255,0.06);
  --amber: #f5a623; --amber-dim: rgba(245,166,35,0.15); --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.12);
  --text: #e2e8f0; --muted: #64748b; --correct: #10b981; --correct-bg: rgba(16,185,129,0.08);
  --wrong: #ef4444; --wrong-bg: rgba(239,68,68,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 999; }
.rain { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.drop { position: absolute; top: -20px; width: 1px; background: linear-gradient(transparent, rgba(180,200,255,0.15)); animation: fall linear infinite; }
@keyframes fall { to { transform: translateY(110vh); } }
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }
#cover { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px 240px; text-align: center; position: relative; z-index: 1; }
#cover.active { display: flex; }
.city-bg { position: absolute; bottom: 0; left: 0; right: 0; height: 220px; pointer-events: none; overflow: hidden; z-index: 0; }
.city-bg svg { width: 100%; height: 100%; }
.cover-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 480px; }
.cover-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--amber-dim); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; padding: 6px 14px; margin-bottom: 28px; }
.cover-title { font-family: 'Instrument Serif', serif; font-size: clamp(52px, 10vw, 96px); font-weight: 400; line-height: 0.95; letter-spacing: -2px; margin-bottom: 8px; color: var(--text); }
.cover-title span { font-style: italic; color: var(--amber); }
.cover-sub { font-size: clamp(13px, 1.8vw, 16px); color: var(--muted); line-height: 1.7; max-width: 420px; margin: 0 auto 32px; font-weight: 400; }
.cover-divider { width: 1px; height: 40px; background: linear-gradient(var(--amber), transparent); margin: 0 auto 32px; }
.name-label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; text-align: left; width: 100%; }
.name-input { display: block; width: 100%; background: var(--card); border: 1px solid rgba(245,166,35,0.25); color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; padding: 13px 16px; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
.name-input::placeholder { color: var(--muted); }
.name-input:focus { border-color: var(--amber); }
.btn-start { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; background: var(--amber); color: var(--bg); border: none; padding: 15px 36px; cursor: pointer; transition: all 0.2s; width: 100%; }
.btn-start:hover { background: #fbbf24; transform: translateY(-2px); box-shadow: 0 12px 40px rgba(245,166,35,0.3); }
.cover-meta { margin-top: 20px; font-size: 11px; letter-spacing: 2px; color: rgba(100,116,139,0.6); text-transform: uppercase; }
#case-screen { max-width: 700px; margin: 0 auto; padding: 28px 20px 80px; min-height: 100vh; }
.case-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.case-id { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--amber); text-transform: uppercase; }
.case-progress { display: flex; gap: 5px; }
.prog-dot { width: 28px; height: 3px; background: var(--border); transition: background 0.3s; }
.prog-dot.done { background: var(--amber); }
.prog-dot.current { background: var(--blue); }
.case-counter { font-size: 10px; letter-spacing: 2px; color: var(--muted); }
.evidence-card { background: var(--card); border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
.evidence-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
.evidence-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.evidence-label { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.evidence-loc { font-size: 9px; letter-spacing: 2px; color: var(--amber); text-transform: uppercase; margin-left: auto; }
.evidence-body { padding: 24px 20px 20px; }
.evidence-emoji { font-size: 36px; margin-bottom: 14px; display: block; }
.evidence-scene { font-family: 'Instrument Serif', serif; font-size: clamp(17px, 2.5vw, 21px); line-height: 1.7; color: var(--text); margin-bottom: 10px; font-style: italic; }
.evidence-note { font-size: 13px; color: var(--muted); line-height: 1.6; padding-top: 12px; border-top: 1px solid var(--border); }
.skill-tag { display: inline-block; margin-top: 14px; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); background: var(--blue-dim); padding: 4px 10px; }
.q-label { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.q-text { font-family: 'Instrument Serif', serif; font-size: clamp(17px, 2.5vw, 21px); font-style: italic; color: var(--text); line-height: 1.5; margin-bottom: 18px; }
.options { display: grid; gap: 8px; }
.opt { background: var(--card); border: 1px solid var(--border); padding: 14px 18px; text-align: left; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 400; color: var(--text); line-height: 1.5; transition: all 0.15s; position: relative; }
.opt::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--amber); transition: width 0.15s; }
.opt:hover:not(:disabled) { border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.04); }
.opt:hover:not(:disabled)::after { width: 2px; }
.opt-key { font-size: 10px; font-weight: 700; color: var(--muted); min-width: 16px; padding-top: 2px; transition: color 0.15s; letter-spacing: 1px; }
.opt.correct { border-color: rgba(16,185,129,0.4); background: var(--correct-bg); }
.opt.correct::after { width: 2px; background: var(--correct); }
.opt.wrong { border-color: rgba(239,68,68,0.3); background: var(--wrong-bg); opacity: 0.6; }
.opt.wrong::after { width: 2px; background: var(--wrong); }
.feedback { display: none; margin-top: 16px; border: 1px solid rgba(16,185,129,0.2); background: var(--correct-bg); padding: 18px 20px; animation: up 0.3s ease forwards; }
.feedback.wrong-fb { border-color: rgba(239,68,68,0.2); background: var(--wrong-bg); }
.feedback.show { display: block; }
.fb-status { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--correct); margin-bottom: 8px; }
.feedback.wrong-fb .fb-status { color: var(--wrong); }
.fb-story { font-family: 'Instrument Serif', serif; font-size: 16px; font-style: italic; color: var(--text); line-height: 1.7; margin-bottom: 10px; }
.fb-tip { font-size: 12px; color: var(--muted); line-height: 1.6; padding-top: 10px; border-top: 1px solid var(--border); }
.btn-next { display: none; margin-top: 18px; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; background: transparent; color: var(--amber); border: 1px solid rgba(245,166,35,0.25); padding: 12px 26px; cursor: pointer; transition: all 0.2s; }
.btn-next.show { display: inline-flex; align-items: center; gap: 10px; }
/* RESULT STYLES MANTIDOS */
#result-screen { min-height: 100vh; display: none; flex-direction: column; align-items: center; padding: 60px 24px 80px; text-align: center; position: relative; z-index: 1; }
#result-screen.active { display: flex; }
.result-title { font-family: 'Instrument Serif', serif; font-size: clamp(36px, 7vw, 72px); font-style: italic; color: var(--text); margin-bottom: 6px; line-height: 1; }
.skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 6px; width: 100%; max-width: 580px; margin-bottom: 36px; text-align: left; }
.sk-card { background: var(--card); border: 1px solid var(--border); padding: 12px 14px; }
</style>
</head>
<body>
<div class="rain" id="rain"></div>

<div id="cover" class="screen active">
  <div class="city-bg">
    <svg viewBox="0 0 1200 220" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="120" width="40" height="100" fill="#0f1420"/><rect x="10" y="100" width="20" height="20" fill="#0f1420"/><rect x="50" y="80" width="60" height="140" fill="#131825"/><rect x="60" y="60" width="40" height="20" fill="#131825"/><rect x="120" y="100" width="30" height="120" fill="#0f1420"/><rect x="160" y="60" width="80" height="160" fill="#131825"/><rect x="175" y="40" width="50" height="20" fill="#131825"/><rect x="195" y="20" width="10" height="20" fill="#f5a623" opacity="0.6"/><rect x="250" y="90" width="50" height="130" fill="#0f1420"/><rect x="310" y="50" width="70" height="170" fill="#131825"/><rect x="325" y="30" width="40" height="20" fill="#131825"/><rect x="390" y="110" width="40" height="110" fill="#0f1420"/><rect x="440" y="70" width="90" height="150" fill="#131825"/><rect x="460" y="50" width="50" height="20" fill="#131825"/><rect x="480" y="35" width="10" height="15" fill="#3b82f6" opacity="0.5"/><rect x="540" y="95" width="35" height="125" fill="#0f1420"/><rect x="585" y="55" width="75" height="165" fill="#131825"/><rect x="600" y="35" width="45" height="20" fill="#131825"/><rect x="670" y="85" width="55" height="135" fill="#0f1420"/><rect x="735" y="65" width="65" height="155" fill="#131825"/><rect x="748" y="45" width="39" height="20" fill="#131825"/><rect x="760" y="30" width="8" height="15" fill="#f5a623" opacity="0.4"/><rect x="810" y="100" width="45" height="120" fill="#0f1420"/><rect x="865" y="75" width="55" height="145" fill="#131825"/><rect x="930" y="55" width="80" height="165" fill="#0f1420"/><rect x="945" y="35" width="50" height="20" fill="#0f1420"/><rect x="1020" y="90" width="40" height="130" fill="#131825"/><rect x="1070" y="70" width="60" height="150" fill="#0f1420"/><rect x="1140" y="100" width="60" height="120" fill="#131825"/><rect x="0" y="190" width="1200" height="30" fill="#090c12"/>
    </svg>
  </div>
  <div class="cover-inner">
    <div class="cover-badge">🔍 An English Mystery</div>
    <h1 class="cover-title">The Last<br><span>Signal</span></h1>
    <div class="cover-divider"></div>
    <p class="cover-sub">Someone is missing. The city is quiet. Too quiet.<br>You are the detective. Every word you choose matters.<br>Speak well — and solve the case.</p>
    <label class="name-label">Your name, Detective</label>
    <input class="name-input" id="player-name" type="text" placeholder="Type your name here...">
    <button class="btn-start" onclick="startGame()">Open the Case File</button>
  </div>
</div>

<div id="case-screen" class="screen">
  <div class="case-topbar">
    <div class="case-id" id="case-id">CASE #001 · CLUE 1</div>
    <div class="case-progress" id="case-progress"></div>
    <div class="case-counter" id="case-counter">1 / 10</div>
  </div>
  <div class="evidence-card">
    <div class="evidence-header"><div class="evidence-dot"></div><div class="evidence-label">Live Evidence</div><div class="evidence-loc" id="ev-loc"></div></div>
    <div class="evidence-body">
      <span class="evidence-emoji" id="ev-emoji"></span>
      <p class="evidence-scene" id="ev-scene"></p>
      <p class="evidence-note" id="ev-note"></p>
      <div class="skill-tag" id="ev-tag"></div>
    </div>
  </div>
  <div class="q-label">What do you say?</div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"><div class="fb-status" id="fb-status"></div><div class="fb-story" id="fb-story"></div><div class="fb-tip" id="fb-tip"></div></div>
  <button class="btn-next" id="btn-next" onclick="nextClue()">Next clue →</button>
</div>

<div id="result-screen" class="screen">
  <div class="result-case">🔍 Case Closed</div>
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-title" id="res-title"></div>
  <div class="result-rank" id="res-rank"></div>
  <div class="result-rule"></div>
  <p class="result-story" id="res-story"></p>
  <div class="score-row" id="score-row"></div>
  <p class="result-desc" id="res-desc"></p>
  <div class="skills-grid" id="skills-grid"></div>
  <button class="btn-restart" onclick="restart()">↩ Reopen the case</button>
</div>

<script>
// EFEITO DE CHUVA ORIGINAL
(function() {
  const rain = document.getElementById('rain');
  for (let i = 0; i < 60; i++) {
    const d = document.createElement('div'); d.className = 'drop';
    const h = Math.random() * 80 + 40;
    d.style.cssText = `left:${Math.random()*100}%;height:${h}px;animation-duration:${(Math.random()*1.5+0.8).toFixed(2)}s;animation-delay:${(Math.random()*3).toFixed(2)}s;opacity:${(Math.random()*0.4+0.1).toFixed(2)};`;
    rain.appendChild(d);
  }
})();

// TODAS AS 10 PISTAS COM SUAS HISTÓRIAS ORIGINAIS
const clues = [
  {
    loc: "COFFEE SHOP · 11PM", emoji: "☕",
    scene: "You sit down with a witness. She's nervous. You ask her why she was learning English. She takes a deep breath.",
    note: "Her answer will tell you a lot about her — and maybe about the missing person.",
    tag: "CONNECTORS — because, and, also",
    question: "Why are you learning English?",
    options: [
      { text: "For work. For travel.", correct: false },
      { text: "I learn English for work and for travel.", correct: false },
      { text: "I'm learning English because I need it for work, and I also love traveling.", correct: true },
      { text: "English important. Work. Travel.", correct: false }
    ],
    ok: { status: "✓ LEAD CONFIRMED", story: "She relaxes. \"That's exactly what he said too,\" she whispers. You write it down. A connection — small, but real.", tip: "Use 'because' to explain reasons. Use 'and' and 'also' to add information." },
    fail: { status: "✗ LEAD LOST", story: "She frowns. \"I don't understand what you mean.\" She picks up her bag. You're losing her.", tip: "Connect your ideas! Without connectors, sentences feel broken." }
  },
  // ... (TODAS AS OUTRAS PISTAS ORIGINAIS ESTÃO NO CÓDIGO)
  {
    loc: "POLICE ARCHIVE · MIDNIGHT", emoji: "🗃️",
    scene: "You find an old interview recording. The missing person spoke about a trip. You need to understand exactly what they said.",
    note: "They used three different tenses. Listen carefully — every verb tense is a clue.",
    tag: "MIXED TENSES — past + present + future",
    question: "Tell me about your last trip.",
    options: [
      { text: "I go to beach. It good.", correct: false },
      { text: "I went to the beach. It was good.", correct: false },
      { text: "I went to the beach last month. It was amazing! I'm planning to go back next year.", correct: true },
      { text: "I go beach last month. Next year I go again.", correct: false }
    ],
    ok: { status: "✓ CLUE RECOVERED", story: "The recording is clear. Past, present, future — all in order. You now know where they went.", tip: "Use past ('went') for finished actions and present continuous ('I'm planning') for current plans." },
    fail: { status: "✗ RECORDING CORRUPTED", story: "The tenses are wrong. The timeline doesn't make sense.", tip: "Past, present and future each have a specific job in a timeline." }
  },
  {
    loc: "RESTAURANT · 1AM", emoji: "🍽️",
    scene: "You're undercover at the last place the missing person was seen. The waiter brings the wrong dish.",
    note: "How you handle this moment might make the waiter talk. Be firm, but polite.",
    tag: "POLITE PROBLEM-SOLVING — formal register",
    question: "You ordered chicken, but they bring you fish. What do you say?",
    options: [
      { text: "No! Chicken!", correct: false },
      { text: "This is not chicken.", correct: false },
      { text: "Excuse me, I ordered chicken, but this is fish. Could you please change it?", correct: true },
      { text: "Wrong food.", correct: false }
    ],
    ok: { status: "✓ WITNESS COOPERATES", story: "The waiter pauses. \"You speak well,\" he says quietly. \"The person you're looking for — they sat right there.\"", tip: "'Excuse me' + 'Could you please...?' is polite and clear." },
    fail: { status: "✗ WAITER WALKS AWAY", story: "He gives you a cold look and disappears into the kitchen. No information.", tip: "Being rude closes conversations. Try to be more formal." }
  },
  {
    loc: "BORDER RECORDS · 2AM", emoji: "🛂",
    scene: "You're checking travel records. An officer asks if the suspect has ever been to another country.",
    note: "This is about experience — something that happened at an unspecified time in the past.",
    tag: "PRESENT PERFECT — experiences",
    question: "Have you ever been to another country?",
    options: [
      { text: "Yes, I go to Argentina.", correct: false },
      { text: "Yes, I was in Argentina.", correct: false },
      { text: "Yes, I've been to Argentina.", correct: true },
      { text: "Yes, Argentina.", correct: false }
    ],
    ok: { status: "✓ RECORD FOUND", story: "The officer nods and pulls up the file. Entry stamp: Buenos Aires, March 2022. This changes everything.", tip: "'I've been to...' is for experiences when the exact time doesn't matter." },
    fail: { status: "✗ WRONG TENSE, WRONG FILE", story: "The system rejects the search. Wrong verb form.", tip: "For experiences without a specific time, use present perfect: 'I'VE BEEN'." }
  },
  {
    loc: "INTERROGATION ROOM · 3AM", emoji: "💡",
    scene: "You're interviewing a social media manager. She asks your opinion on social media.",
    note: "Give a real opinion. Use structure. She'll only talk to someone who thinks carefully.",
    tag: "EXPRESSING OPINION — I think + because + but",
    question: "What do you think about social media?",
    options: [
      { text: "Social media good.", correct: false },
      { text: "I think social media is good.", correct: false },
      { text: "I think social media is good because it helps us stay connected, but it can also be addictive.", correct: true },
      { text: "Good and bad.", correct: false }
    ],
    ok: { status: "✓ TRUST ESTABLISHED", story: "She leans forward. \"Finally, someone who actually thinks.\"", tip: "Opinion + reason + contrast = a strong, fluent answer." },
    fail: { status: "✗ SHE DOESN'T TRUST YOU", story: "She crosses her arms. \"You're not really thinking, are you?\"", tip: "A complete opinion needs 'because' and 'but'." }
  },
  {
    loc: "PHONE CALL · 4AM", emoji: "📞",
    scene: "Your partner calls. He's sick but insisting on coming in. You need to stop him.",
    note: "He has a cold. He needs rest. Tell him what to do.",
    tag: "GIVING ADVICE — should",
    question: "Your partner has a cold. What do you tell him?",
    options: [
      { text: "You drink water.", correct: false },
      { text: "Drink water!", correct: false },
      { text: "You should drink a lot of water and rest.", correct: true },
      { text: "Water good.", correct: false }
    ],
    ok: { status: "✓ PARTNER LISTENS", story: "He sighs. \"You're right. I'll stay home.\" He sends you one last thing — a name.", tip: "'You should...' is the standard way to give advice." },
    fail: { status: "✗ HE IGNORES YOU", story: "\"That's not real advice,\" he says, and hangs up.", tip: "Use 'should' for advice: 'You SHOULD drink water'." }
  },
  {
    loc: "SUSPECT'S APARTMENT · 5AM", emoji: "🚪",
    scene: "You find a note. It's incomplete. Someone started a sentence but stopped.",
    note: "The note describes a conflict — something they wanted to do, but couldn't.",
    tag: "CONNECTORS — contrast with 'but'",
    question: "Complete: \"I wanted to watch the movie, ____ it was too late.\"",
    options: [
      { text: "and", correct: false },
      { text: "because", correct: false },
      { text: "but", correct: true },
      { text: "for", correct: false }
    ],
    ok: { status: "✓ MESSAGE DECODED", story: "The note makes sense now. They wanted to leave — but something stopped them.", tip: "'But' shows contrast — two things that don't match." },
    fail: { status: "✗ MESSAGE UNCLEAR", story: "The sentence doesn't make sense. The meaning is lost.", tip: "'But' connects contrasting ideas." }
  },
  {
    loc: "COLLEAGUE'S DESK · 6AM", emoji: "🗣️",
    scene: "You talk to the missing person's colleague. You need to write the report in the correct form.",
    note: "Your colleague told you directly. Now you have to report it to your superior.",
    tag: "REPORTED SPEECH — backshift",
    question: "Your colleague said: \"I'm tired.\" Now tell your superior what she said.",
    options: [
      { text: "She said she tired.", correct: false },
      { text: "She said \"I'm tired\".", correct: false },
      { text: "She said she was tired.", correct: true },
      { text: "She tired.", correct: false }
    ],
    ok: { status: "✓ REPORT ACCEPTED", story: "Your superior nods. \"Good. She wasn't the only one.\"", tip: "In reported speech, 'am/is' shifts to 'was'." },
    fail: { status: "✗ REPORT REJECTED", story: "\"That's not how you write a report,\" your superior says.", tip: "Reported speech: change 'am' → 'was'." }
  },
  {
    loc: "CASE NOTES · 7AM", emoji: "📋",
    scene: "You read the missing person's final journal entry.",
    note: "Read carefully. The answer is in the text — but you have to infer it.",
    tag: "READING COMPREHENSION — inference",
    question: "\"John loves his job, but he's thinking about changing careers because he wants more free time.\" What can we understand?",
    options: [
      { text: "John hates his job.", correct: false },
      { text: "John wants to work more.", correct: false },
      { text: "John's current job doesn't give him much free time.", correct: true },
      { text: "John has a lot of free time.", correct: false }
    ],
    ok: { status: "✓ MOTIVE IDENTIFIED", story: "That's it. He wasn't running from something — he was running toward something.", tip: "Inference means reading between the lines." },
    fail: { status: "✗ WRONG CONCLUSION", story: "You go looking in the wrong direction. Three hours wasted.", tip: "Read carefully — think about what the text implies." }
  },
  {
    loc: "ROOFTOP · DAWN", emoji: "🌅",
    scene: "You find them. Standing on the rooftop. They say: 'It might rain tomorrow.' You have one last thing to say.",
    note: "This is the final moment. A conditional — a promise, a plan, a future.",
    tag: "FIRST CONDITIONAL — if + will",
    question: "Complete: \"If it rains tomorrow, ____\"",
    options: [
      { text: "I stay home yesterday.", correct: false },
      { text: "I stayed home.", correct: false },
      { text: "I'll stay home.", correct: true },
      { text: "I staying home.", correct: false }
    ],
    ok: { status: "✓ CASE CLOSED", story: "They smile. \"Good.\" The city lights are fading. You solved it.", tip: "First conditional: IF + present simple → WILL + verb." },
    fail: { status: "✗ ALMOST", story: "They tilt their head. \"Almost right.\" The moment passes.", tip: "First conditional: 'If it rains, I'LL stay home'." }
  }
];

let current = 0, score = 0, answers = [], playerName = '';

// FUNÇÕES DE LÓGICA DO JOGO MANTIDAS
function buildProgress() {
  const wrap = document.getElementById('case-progress');
  wrap.innerHTML = '';
  for (let i = 0; i < clues.length; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot' + (i < current ? ' done' : i === current ? ' current' : '');
    wrap.appendChild(d);
  }
  document.getElementById('case-counter').textContent = `${current + 1} / ${clues.length}`;
  document.getElementById('case-id').textContent = `CASE #001 · CLUE ${current + 1}`;
}

function showClue() {
  const c = clues[current];
  buildProgress();
  document.getElementById('ev-loc').textContent = c.loc;
  document.getElementById('ev-emoji').textContent = c.emoji;
  document.getElementById('ev-scene').textContent = c.scene;
  document.getElementById('ev-note').textContent = c.note;
  document.getElementById('ev-tag').textContent = c.tag;
  document.getElementById('q-text').textContent = c.question;
  const box = document.getElementById('options');
  box.innerHTML = '';
  ['A','B','C','D'].forEach((L, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="opt-key">${L}</span><span>${c.options[i].text}</span>`;
    b.onclick = () => pick(i, c.options[i].correct);
    box.appendChild(b);
  });
  document.getElementById('feedback').classList.remove('show','wrong-fb');
  document.getElementById('btn-next').classList.remove('show');
}

function pick(idx, correct) {
  const c = clues[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  answers.push(correct);
  if (correct) score++;
  const data = correct ? c.ok : c.fail;
  if (correct) btns[idx].classList.add('correct');
  else {
    btns[idx].classList.add('wrong');
    c.options.forEach((o, i) => { if (o.correct) btns[i].classList.add('correct'); });
  }
  const fb = document.getElementById('feedback');
  document.getElementById('fb-status').textContent = data.status;
  document.getElementById('fb-story').textContent = data.story;
  document.getElementById('fb-tip').textContent = '📎 ' + data.tip;
  if (!correct) fb.classList.add('wrong-fb');
  fb.classList.add('show');
  document.getElementById('btn-next').classList.add('show');
}

function nextClue() {
  current++;
  if (current >= clues.length) { showResult(); return; }
  showClue();
}

function startGame() {
  playerName = document.getElementById('player-name').value.trim() || 'Detective';
  current = 0; score = 0; answers = [];
  document.getElementById('cover').classList.remove('active');
  document.getElementById('case-screen').classList.add('active');
  showClue();
}

function showResult() {
  document.getElementById('case-screen').classList.remove('active');
  const rs = document.getElementById('result-screen');
  rs.classList.add('active');

  // ENVIO PARA A PLANILHA (ADICIONADO)
  const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbyYk6C0qYLPZK-VtkrJBFvxNiOQQwbUlhSsMKT6fecbQXOE2XFo-Kv8upqMgzEIS6WAiw/exec";
  fetch(URL_PLANILHA, {
    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: playerName, score: score, answers: answers.map(a => a ? 1 : 0) })
  });

  // RESTANTE DOS RESULTADOS ORIGINAIS
  const pct = score / clues.length;
  let emoji, title, rank, story, desc;
  if (pct >= 0.9) {
    emoji = "🏅"; title = "Master Detective"; rank = "B1 · Ready for B2";
    story = `Every clue confirmed. Every witness trusted you, ${playerName}. The case is closed — perfectly.`;
    desc = "Your English is confident and accurate at A2/B1 level.";
  } else {
    emoji = "🔍"; title = "Sharp Detective"; rank = "Solid A2/B1";
    story = `The case is solved, ${playerName}. Not every lead worked out — but you got there.`;
    desc = "Strong foundations! Keep practicing to sharpen your skills.";
  }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-rank').textContent = rank;
  document.getElementById('res-story').textContent = story;
  document.getElementById('res-desc').textContent = desc;
  document.getElementById('score-row').innerHTML = answers.map((h,i) => `<div class="s-pip ${h?'hit':'miss'}">${h?'✓':'✗'}</div>`).join('');
}

function restart() { location.reload(); }
</script>
</body>
</html>
